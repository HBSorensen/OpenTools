# OpenTools distro: a slim, appliance-focused derivative of Poky.
#
# Goal: smallest sensible footprint that still runs a Qt6 GUI directly on the
# GPU (eglfs/KMS) with no X11 or Wayland display server.

require conf/distro/poky.conf

DISTRO = "opentools"
DISTRO_NAME = "OpenTools Linux"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "gsender"
MAINTAINER = "OpenTools <hbsn@foss.dk>"
SDK_VENDOR = "-opentoolssdk"

# systemd as init (needed for the kiosk service, udev automount, mount units).
INIT_MANAGER = "systemd"

# Trim features we never use on this appliance. Crucially: no x11/wayland
# (Qt renders straight to KMS/DRM via eglfs), and add opengl so Mesa builds the
# vc4 GLESv2 driver that eglfs needs on the Pi.
DISTRO_FEATURES:remove = "x11 wayland vulkan bluetooth nfc 3g zeroconf pcmcia pci-x irda pulseaudio"
DISTRO_FEATURES:append = " opengl"

# Don't drag in locale bloat.
IMAGE_LINGUAS = ""
ENABLE_BINARY_LOCALE_GENERATION = "0"

# Prefer runtime-lean choices.
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_dev_manager = "systemd"

# We build our own tiny image; no need for the reference distro's extras.
DISTRO_FEATURES_BACKFILL_CONSIDERED += "pulseaudio"
